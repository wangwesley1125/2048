<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#13151f;
    --bg-1:#1b1e2b;
    --board:#222637;
    --cell:rgba(255,255,255,.045);
    --ink:#eef1f8;
    --muted:#8b91a6;
    --accent:#e85a35;
    --gap:14px;
    --radius:10px;
    font-family:'Poppins',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 70% -10%, #20243a 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    color:var(--ink);
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .wrap{width:min(460px,100%)}

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin-bottom:6px;
  }
  .title{
    font-weight:800;
    font-size:clamp(44px,13vw,62px);
    letter-spacing:-2px;
    line-height:.9;
    background:linear-gradient(135deg,#7fd0ff 0%, #ffd23a 45%, #e85a35 75%, #d6306b 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .title small{
    display:block;
    -webkit-text-fill-color:var(--muted);
    color:var(--muted);
    font-size:12px;
    font-weight:500;
    letter-spacing:.5px;
    margin-top:8px;
  }
  .scores{display:flex;gap:10px}
  .score-box{
    background:var(--board);
    border-radius:var(--radius);
    padding:8px 14px;
    text-align:center;
    min-width:78px;
    position:relative;
    overflow:hidden;
  }
  .score-box .label{
    font-size:10px;font-weight:600;letter-spacing:1.5px;
    color:var(--muted);text-transform:uppercase;
  }
  .score-box .val{font-size:22px;font-weight:700;line-height:1.15;font-variant-numeric:tabular-nums}
  .gain{
    position:absolute;left:0;right:0;top:18px;
    font-size:16px;font-weight:700;color:var(--accent);
    opacity:0;pointer-events:none;
  }
  .gain.run{animation:floatUp .6s ease-out}
  @keyframes floatUp{
    0%{opacity:1;transform:translateY(0)}
    100%{opacity:0;transform:translateY(-26px)}
  }

  .bar{
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;margin:14px 2px 16px;
  }
  .hint{font-size:13px;color:var(--muted);line-height:1.4}
  .hint b{color:var(--ink);font-weight:600}
  button.newgame{
    font-family:inherit;font-weight:700;font-size:14px;
    color:#fff;background:var(--accent);
    border:none;border-radius:var(--radius);
    padding:11px 18px;cursor:pointer;white-space:nowrap;
    transition:transform .08s ease, filter .15s ease;
  }
  button.newgame:hover{filter:brightness(1.08)}
  button.newgame:active{transform:scale(.96)}
  button.newgame:focus-visible{outline:3px solid #ffffff66;outline-offset:2px}

  .board{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:var(--board);
    border-radius:16px;
    padding:var(--gap);
    touch-action:none;
    user-select:none;
  }
  .grid-bg{
    position:absolute;inset:var(--gap);
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:var(--gap);
  }
  .grid-bg span{background:var(--cell);border-radius:var(--radius)}

  .tiles{position:absolute;inset:0}
  .tile{
    position:absolute;
    display:flex;align-items:center;justify-content:center;
    border-radius:var(--radius);
    font-weight:700;
    font-variant-numeric:tabular-nums;
    color:#fff;
    will-change:transform;
    transition:transform .12s cubic-bezier(.3,.8,.4,1);
    box-shadow:0 4px 12px rgba(0,0,0,.25);
  }
  .tile-new{animation:appear .14s ease-out}
  @keyframes appear{from{transform:scale(.1)}to{transform:scale(1)}}
  /* appear scale handled separately since transform also positions; we use inner span for value to allow pop */
  .tile .v{display:block;transition:transform .1s ease}
  .tile.pop .v{animation:pop .16s ease}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}

  /* thermal color scale */
  .v2{background:#2d4a63}
  .v4{background:#2f6b6b}
  .v8{background:#2e8a5c}
  .v16{background:#56a64a}
  .v32{background:#94bb3a}
  .v64{background:#d4b23a}
  .v128{background:#e09a36}
  .v256{background:#e87b35}
  .v512{background:#e85a35}
  .v1024{background:#e23b3b}
  .v2048{background:#d6306b;box-shadow:0 0 22px #d6306b88,0 4px 12px rgba(0,0,0,.3)}
  .vbig{background:#a32bb8;box-shadow:0 0 26px #a32bb888,0 4px 12px rgba(0,0,0,.3)}

  .overlay{
    position:absolute;inset:0;
    background:rgba(20,22,33,.78);
    backdrop-filter:blur(2px);
    border-radius:16px;
    display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:16px;
    text-align:center;padding:24px;
    z-index:5;
  }
  .overlay.show{display:flex;animation:fade .3s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay h2{font-size:34px;font-weight:800;letter-spacing:-1px}
  .overlay p{color:var(--muted);font-size:14px;margin-top:-6px}
  .overlay .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .overlay button{
    font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;
    border-radius:var(--radius);padding:11px 18px;border:none;
    transition:transform .08s ease,filter .15s ease;
  }
  .overlay button:active{transform:scale(.96)}
  .overlay .primary{background:var(--accent);color:#fff}
  .overlay .ghost{background:transparent;color:var(--ink);border:1px solid #ffffff33}

  footer{margin-top:16px;text-align:center;color:var(--muted);font-size:12px;line-height:1.5}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">2048
        <small>合併方塊 · 盤面隨數字升溫</small>
      </div>
      <div class="scores">
        <div class="score-box">
          <div class="label">分數</div>
          <div class="val" id="score">0</div>
          <div class="gain" id="gain"></div>
        </div>
        <div class="score-box">
          <div class="label">最佳</div>
          <div class="val" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="bar">
      <div class="hint">滑動或用 <b>方向鍵 / WASD</b> 移動方塊，<br>相同數字相撞就會合併。</div>
      <button class="newgame" id="new">新遊戲</button>
    </div>

    <div class="board" id="board">
      <div class="grid-bg" id="gridbg"></div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay">
        <h2 id="ov-title"></h2>
        <p id="ov-sub"></p>
        <div class="actions" id="ov-actions"></div>
      </div>
    </div>

    <footer>抵達 <b style="color:var(--ink)">2048</b> 即獲勝，之後仍可繼續挑戰更高的數字。</footer>
  </div>

<script>
(() => {
  const SIZE = 4;
  const boardEl = document.getElementById('board');
  const tilesEl = document.getElementById('tiles');
  const gridbgEl = document.getElementById('gridbg');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const gainEl = document.getElementById('gain');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovSub = document.getElementById('ov-sub');
  const ovActions = document.getElementById('ov-actions');

  let grid, tiles, nextId, score, best = 0, won, over, keepPlaying, busy;
  let cellSize = 0, gap = 0;

  // build background cells
  for (let i = 0; i < SIZE * SIZE; i++) gridbgEl.appendChild(document.createElement('span'));

  // ---- persistent best score (best-effort) ----
  async function loadBest(){
    try{
      const r = await window.storage.get('best');
      if (r && r.value != null){ best = parseInt(r.value,10) || 0; bestEl.textContent = best; }
    }catch(e){ /* storage unavailable: keep in memory */ }
  }
  async function saveBest(){
    try{ await window.storage.set('best', String(best)); }catch(e){}
  }

  const vectors = {
    up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}
  };

  function newGame(){
    grid = Array.from({length:SIZE}, () => Array(SIZE).fill(null));
    tiles = [];
    nextId = 1;
    score = 0;
    won = false; over = false; keepPlaying = false; busy = false;
    tilesEl.innerHTML = '';
    overlay.className = 'overlay';
    scoreEl.textContent = '0';
    addRandomTile(); addRandomTile();
    layout();
    render(false);
  }

  function emptyCells(){
    const c = [];
    for (let x=0;x<SIZE;x++) for (let y=0;y<SIZE;y++) if(!grid[x][y]) c.push({x,y});
    return c;
  }

  function addRandomTile(){
    const cells = emptyCells();
    if (!cells.length) return;
    const {x,y} = cells[Math.floor(Math.random()*cells.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const t = {id:nextId++, x, y, value, isNew:true, merged:false, dead:false, el:null};
    grid[x][y] = t;
    tiles.push(t);
  }

  const within = p => p.x>=0 && p.x<SIZE && p.y>=0 && p.y<SIZE;

  function buildTraversals(v){
    const xs=[0,1,2,3], ys=[0,1,2,3];
    if (v.x===1) xs.reverse();
    if (v.y===1) ys.reverse();
    return {xs, ys};
  }

  function findFarthest(cell, v){
    let prev, p = {x:cell.x, y:cell.y};
    do { prev = p; p = {x:prev.x+v.x, y:prev.y+v.y}; }
    while (within(p) && !grid[p.x][p.y]);
    return {farthest:prev, next:p};
  }

  function move(dir){
    if (busy || over || (won && !keepPlaying)) return;
    const v = vectors[dir];
    const {xs, ys} = buildTraversals(v);
    let moved = false, gained = 0;

    tiles.forEach(t => { t.isNew = false; t.merged = false; });

    xs.forEach(x => {
      ys.forEach(y => {
        const tile = grid[x][y];
        if (!tile) return;
        const {farthest, next} = findFarthest({x,y}, v);
        const target = within(next) ? grid[next.x][next.y] : null;

        if (target && target.value === tile.value && !target.merged && !target.dead){
          // merge tile into target
          grid[tile.x][tile.y] = null;
          tile.x = next.x; tile.y = next.y; tile.dead = true; // slides in then removed
          target.value *= 2;
          target.merged = true;
          gained += target.value;
          if (target.value === 2048 && !won) won = true;
          moved = true;
        } else if (farthest.x !== x || farthest.y !== y){
          grid[tile.x][tile.y] = null;
          grid[farthest.x][farthest.y] = tile;
          tile.x = farthest.x; tile.y = farthest.y;
          moved = true;
        }
      });
    });

    if (!moved) return;

    busy = true;
    if (gained){
      score += gained;
      flashGain(gained);
      if (score > best){ best = score; bestEl.textContent = best; saveBest(); }
      scoreEl.textContent = score;
    }
    render(true);

    setTimeout(() => {
      // remove dead (merged-away) tiles
      tiles = tiles.filter(t => {
        if (t.dead){ if (t.el) t.el.remove(); return false; }
        return true;
      });
      addRandomTile();
      layout();
      render(false);
      busy = false;
      if (won && !keepPlaying){ showOverlay('win'); }
      else if (!movesAvailable()){ over = true; showOverlay('over'); }
    }, 125);
  }

  function movesAvailable(){
    if (emptyCells().length) return true;
    for (let x=0;x<SIZE;x++) for (let y=0;y<SIZE;y++){
      const t = grid[x][y]; if(!t) continue;
      for (const k in vectors){
        const v = vectors[k];
        const nx=x+v.x, ny=y+v.y;
        if (nx>=0&&nx<SIZE&&ny>=0&&ny<SIZE){
          const o = grid[nx][ny];
          if (o && o.value === t.value) return true;
        }
      }
    }
    return false;
  }

  function tileClass(value){
    if (value > 2048) return 'vbig';
    return 'v' + value;
  }
  function fontSize(value){
    const len = String(value).length;
    let f = cellSize * 0.46;
    if (len === 3) f = cellSize * 0.38;
    else if (len === 4) f = cellSize * 0.30;
    else if (len >= 5) f = cellSize * 0.24;
    return f;
  }

  function pos(i){ return gap + i * (cellSize + gap); }

  function layout(){
    const rect = boardEl.getBoundingClientRect();
    const S = rect.width;
    gap = Math.max(8, Math.round(S * 0.032));
    cellSize = (S - gap * 5) / SIZE;
    boardEl.style.setProperty('--gap', gap + 'px');
    // reposition existing tiles without animation
    tiles.forEach(t => {
      if (!t.el) return;
      t.el.style.width = cellSize + 'px';
      t.el.style.height = cellSize + 'px';
      t.el.style.fontSize = fontSize(t.value) + 'px';
      const prev = t.el.style.transition;
      t.el.style.transition = 'none';
      t.el.style.transform = `translate(${pos(t.x)}px,${pos(t.y)}px)`;
      void t.el.offsetWidth;
      t.el.style.transition = prev;
    });
  }

  function render(animate){
    tiles.forEach(t => {
      if (!t.el){
        const el = document.createElement('div');
        el.className = 'tile';
        const span = document.createElement('span');
        span.className = 'v';
        el.appendChild(span);
        el.style.width = cellSize + 'px';
        el.style.height = cellSize + 'px';
        // start at final position; appear animation scales it in
        el.style.transition = 'none';
        el.style.transform = `translate(${pos(t.x)}px,${pos(t.y)}px)`;
        tilesEl.appendChild(el);
        void el.offsetWidth;
        el.style.transition = '';
        t.el = el;
        if (t.isNew) el.classList.add('tile-new');
      }
      const span = t.el.querySelector('.v');
      span.textContent = t.value;
      t.el.style.fontSize = fontSize(t.value) + 'px';
      // update color class
      t.el.className = 'tile ' + tileClass(t.value);
      // position (animated via CSS transition)
      t.el.style.transform = `translate(${pos(t.x)}px,${pos(t.y)}px)`;
      // merge pop
      if (t.merged){
        t.el.classList.remove('pop');
        void t.el.offsetWidth;
        t.el.classList.add('pop');
      }
    });
  }

  function flashGain(amount){
    gainEl.textContent = '+' + amount;
    gainEl.classList.remove('run');
    void gainEl.offsetWidth;
    gainEl.classList.add('run');
  }

  function showOverlay(type){
    ovActions.innerHTML = '';
    if (type === 'win'){
      ovTitle.textContent = '達成 2048 🎉';
      ovTitle.style.color = '#ffd23a';
      ovSub.textContent = '要繼續往更高分挑戰嗎？';
      const cont = mkBtn('繼續挑戰', 'primary', () => { keepPlaying = true; overlay.className='overlay'; });
      const restart = mkBtn('重新開始', 'ghost', newGame);
      ovActions.append(cont, restart);
    } else {
      ovTitle.textContent = '遊戲結束';
      ovTitle.style.color = '#e85a35';
      ovSub.textContent = '無法再移動了，得分 ' + score + '。';
      ovActions.append(mkBtn('再玩一次', 'primary', newGame));
    }
    overlay.className = 'overlay show';
  }
  function mkBtn(label, cls, fn){
    const b = document.createElement('button');
    b.className = cls; b.textContent = label; b.onclick = fn;
    return b;
  }

  // ---- input: keyboard ----
  const keyMap = {
    ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
    w:'up', s:'down', a:'left', d:'right',
    W:'up', S:'down', A:'left', D:'right'
  };
  window.addEventListener('keydown', e => {
    const dir = keyMap[e.key];
    if (dir){ e.preventDefault(); move(dir); }
  });

  // ---- input: touch / pointer swipe ----
  let sx=0, sy=0, tracking=false;
  function start(x,y){ sx=x; sy=y; tracking=true; }
  function end(x,y){
    if (!tracking) return;
    tracking = false;
    const dx = x - sx, dy = y - sy;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax,ay) < 24) return;
    if (ax > ay) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }
  boardEl.addEventListener('touchstart', e => { const t=e.touches[0]; start(t.clientX,t.clientY); }, {passive:true});
  boardEl.addEventListener('touchend', e => { const t=e.changedTouches[0]; end(t.clientX,t.clientY); }, {passive:true});
  boardEl.addEventListener('mousedown', e => start(e.clientX,e.clientY));
  window.addEventListener('mouseup', e => end(e.clientX,e.clientY));

  document.getElementById('new').addEventListener('click', newGame);
  window.addEventListener('resize', () => { layout(); });

  // boot
  loadBest().finally(() => { newGame(); });
})();
</script>
</body>
</html>
